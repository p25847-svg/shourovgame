
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
}

.calculator{

    width:420px;
    background:#1b1b1b;
    border-radius:30px;
    padding:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

#display{

    width:100%;
    height:100px;
    border:none;
    outline:none;
    background:#111;
    color:white;
    font-size:45px;
    text-align:right;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
}

.buttons{

    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:12px;
}

button{

    height:65px;
    border:none;
    border-radius:18px;
    font-size:24px;
    cursor:pointer;
    background:#2c2c2c;
    color:white;
    transition:0.2s;
}

button:hover{

    transform:scale(1.05);
}

.operator{

    background:#0d2b45;
}

.equal{

    background:#5ecbff;
    color:black;
}

.top{

    background:#3a3a3a;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" value="0" readonly>

<div class="buttons">

<button class="top" onclick="clearDisplay()">AC</button>
<button class="top" onclick="append('%')">%</button>
<button class="top" onclick="append('(')">(</button>
<button class="top" onclick="append(')')">)</button>
<button class="top" onclick="backspace()">⌫</button>
<button class="operator" onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('Math.sin(')">sin</button>
<button onclick="append('Math.cos(')">cos</button>
<button class="operator" onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('Math.tan(')">tan</button>
<button onclick="append('Math.log10(')">log</button>
<button class="operator" onclick="append('-')">−</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('Math.sqrt(')">√</button>
<button onclick="append('**')">xʸ</button>
<button class="operator" onclick="append('+')">+</button>

<button onclick="append('0')" style="grid-column:span 2;">0</button>
<button onclick="append('.')">.</button>
<button onclick="append('3.1416')">π</button>
<button onclick="append('2.718')">e</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

let display = document.getElementById("display");

function append(value){

    if(display.value === "0"){

        display.value = value;

    }else{

        display.value += value;
    }
}

function clearDisplay(){

    display.value = "0";
}

function backspace(){

    display.value = display.value.slice(0,-1);

    if(display.value === ""){

        display.value = "0";
    }
}

function calculate(){

    try{

        display.value = eval(display.value);

    }catch{

        display.value = "Error";
    }
}

</script>

</body>
</html>
